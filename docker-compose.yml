services:
  db:
    image: postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabdocs_db
      POSTGRES_USER: collabdocs_user
      POSTGRES_PASSWORD: collabdocs_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabdocs_user -d collabdocs_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
